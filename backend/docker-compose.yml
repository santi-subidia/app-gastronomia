services:
  # =============================================
  # PostgreSQL 17
  # =============================================
  postgres:
    image: postgres:17-alpine
    container_name: gastronomia-postgres
    environment:
      POSTGRES_DB: ApiGastronomiaDB
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ApiGastronomiaDB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # =============================================
  # Redis 7
  # =============================================
  redis:
    image: redis:7-alpine
    container_name: gastronomia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # =============================================
  # API .NET 10
  # =============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gastronomia-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__Postgres=Host=postgres;Port=5432;Database=ApiGastronomiaDB;Username=postgres;Password=postgres
      - ConnectionStrings__Redis=redis:6379,abortConnect=false
    ports:
      - "5000:80"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload: sincroniza código local con el contenedor
      - .:/src
      # Evita que los binarios locales sobrescriban los del contenedor
      - /src/bin
      - /src/obj
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
